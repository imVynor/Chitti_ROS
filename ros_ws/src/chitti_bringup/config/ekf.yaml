ekf_filter_node:
  ros__parameters:

    frequency: 10.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    odom0: /odometry/gps
    odom0_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false

    # Hardware Odometry (Wheel spins from diff_drive_controller)
    odom1: /diff_drive_controller/odom
    odom1_config: [false, false, false, # x, y, z positions are ignored over time
                   false, false, false, # roll, pitch, yaw are ignored (imu handles orientation)
                   true,  true,  false, # vx, vy velocities are fused
                   false, false, true,  # v-yaw rotation is fused
                   false, false, false] # accelerations are ignored
    odom1_differential: false

    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true
